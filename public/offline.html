<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ungig — Offline</title>
    <meta name="theme-color" content="#0b1b2b" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: #0b1b2b;
        color: #e6eaf0;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .brand {
        font-family: "Fraunces", Georgia, serif;
        font-size: 2rem;
        font-weight: 700;
        color: #d4a85a;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }
      p { color: #9aa7b7; max-width: 28rem; line-height: 1.5; }
      button {
        margin-top: 1.5rem;
        background: #d4a85a;
        color: #0b1b2b;
        border: none;
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">Ungig</div>
      <p>
        You're offline. Some features need a connection, but we've cached what
        we can. Try again once you're back online.
      </p>
      <button onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
