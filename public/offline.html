<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ungig — Offline</title>
    <meta name="theme-color" content="#0D0D0F" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: "Montserrat", ui-sans-serif, system-ui, sans-serif;
        background: #0D0D0F;
        color: #D5D7DC;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .brand {
        font-family: "Anton", Impact, sans-serif;
        font-size: 3rem;
        color: #D5D7DC;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 0.25rem;
      }
      .accent { color: #A7A1BC; }
      p { color: #8A9099; max-width: 28rem; line-height: 1.5; }
      button {
        margin-top: 1.5rem;
        background: #A7A1BC;
        color: #0D0D0F;
        border: none;
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        font-weight: 600;
        font-family: inherit;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .footer {
        margin-top: auto;
        padding-top: 2rem;
        font-family: "Anton", Impact, sans-serif;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        color: #444F5A;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">UN<span class="accent">GIG</span></div>
      <p>
        You're offline. Some features need a connection, but we've cached what
        we can. Try again once you're back online.
      </p>
      <button onclick="location.reload()">Retry</button>
      <div class="footer">Escape ordinary. Build extraordinary.</div>
    </main>
  </body>
</html>
