<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gifted — Offline</title>
    <meta name="theme-color" content="#F9F8F5" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:ital,wght@1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        font-family: "Manrope", ui-sans-serif, system-ui, sans-serif;
        background: #F9F8F5;
        color: #0F1331;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .mark {
        width: 44px;
        height: 44px;
        border-radius: 999px;
        background: #FFFFFF;
        border: 1px solid #ECEAE4;
        box-shadow: 0 1px 2px rgba(15,19,49,0.04), 0 8px 24px rgba(15,19,49,0.06);
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .mark img { width: 100%; height: 100%; object-fit: cover; }
      .wordmark {
        font-family: "Fraunces", ui-serif, Georgia, serif;
        font-style: italic;
        font-weight: 700;
        font-size: 3rem;
        letter-spacing: -0.01em;
        line-height: 1;
      }
      .wordmark .gif { color: #0F1331; }
      .wordmark .ted { color: #1B7F4F; }
      .tagline {
        margin-top: 0.35rem;
        font-size: 0.75rem;
        font-weight: 600;
        color: #A0A4B0;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      p { color: #2A2D3A; max-width: 28rem; line-height: 1.5; }
      .muted { color: #A0A4B0; font-size: 0.95rem; }
      button {
        margin-top: 1.5rem;
        background: #1B7F4F;
        color: #FFFFFF;
        border: 1px solid rgba(27,127,79,0.25);
        padding: 0.75rem 1.25rem;
        border-radius: 999px;
        font-weight: 600;
        font-family: inherit;
        box-shadow: 0 1px 2px rgba(15,19,49,0.06), 0 8px 18px rgba(27,127,79,0.18);
        cursor: pointer;
      }
      button:hover { background: #16683F; }
      .mascot {
        margin-top: 1.25rem;
        width: min(320px, 80vw);
        filter: drop-shadow(0 12px 24px rgba(15,19,49,0.10));
      }
      .footer {
        margin-top: auto;
        padding-top: 2rem;
        font-size: 0.75rem;
        letter-spacing: 0.12em;
        color: #A0A4B0;
        text-transform: uppercase;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <div class="mark" aria-hidden>
          <img src="/giff/face.png" alt="" />
        </div>
        <div>
          <div class="wordmark"><span class="gif">Gif</span><span class="ted">ted</span></div>
          <div class="tagline">GIVE • RECEIVE • GROW</div>
        </div>
      </div>
      <p>
        You're offline. Some features need a connection, but we've saved what we
        can. Try again once you're back online.
      </p>
      <p class="muted">Give what you can. Receive what you need.</p>
      <button onclick="location.reload()">Retry</button>
      <img class="mascot" src="/giff/standing.png" alt="Giff the Giving Frog" />
      <div class="footer">Gifted</div>
    </main>
  </body>
</html>
